name: Bug report
description: Something is broken or behaves wrong.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the fields below.
        For security issues, email security@mnemohq.com instead — do not file a public issue.
  - type: input
    id: version
    attributes:
      label: Package / SDK version
      placeholder: e.g. @mnemo/memory@0.1.3
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime + OS
      placeholder: Node 22.0 on macOS 14.5
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Code, command, or repo link that reproduces the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
