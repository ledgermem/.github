name: Docs deploy (reusable)
on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: '.'
      project-name:
        description: 'Cloudflare Pages project name'
        required: true
        type: string
      build-script:
        required: false
        type: string
        default: 'build'
      output-directory:
        required: false
        type: string
        default: 'dist'
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    # Cloudflare Pages publishes via wrangler-action using its own API token,
    # so this job has no need for any GitHub token scope. Narrow to
    # `contents: read` so the inherited GITHUB_TOKEN cannot be abused by a
    # compromised build script to push back to the repo.
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - run: npm ci
      - name: Build docs
        env:
          BUILD_SCRIPT: ${{ inputs.build-script }}
        run: npm run "$BUILD_SCRIPT"
      - name: Publish to Cloudflare Pages
        env:
          OUTPUT_DIRECTORY: ${{ inputs.output-directory }}
          PROJECT_NAME: ${{ inputs.project-name }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy "$OUTPUT_DIRECTORY" --project-name="$PROJECT_NAME"
