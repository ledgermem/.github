name: Release (reusable)
on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: '.'
      release-command:
        description: 'npm script that runs the release tool (e.g. semantic-release)'
        required: false
        type: string
        default: 'release'
    secrets:
      NPM_TOKEN:
        required: false
      GH_TOKEN:
        required: false
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - run: npm ci
      - run: npm run ${{ inputs.release-command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
