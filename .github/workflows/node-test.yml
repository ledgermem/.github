name: Node test (reusable)
on:
  workflow_call:
    inputs:
      node-versions:
        description: 'JSON array of Node major versions to test against'
        required: false
        type: string
        default: '["20", "22"]'
      working-directory:
        description: 'Path to the package'
        required: false
        type: string
        default: '.'
      run-build:
        description: 'Run npm run build after tests'
        required: false
        type: boolean
        default: true
jobs:
  test:
    runs-on: ubuntu-latest
    # Reusable workflows inherit the caller's GITHUB_TOKEN permissions when
    # `permissions:` is omitted, which can be `write-all` on legacy repos.
    # A test job only needs to read code — narrow per-job to prevent a
    # malicious dependency from abusing the token at install/test time.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJson(inputs.node-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm test --if-present -- --run
      - name: Build
        if: inputs.run-build
        run: npm run build --if-present
